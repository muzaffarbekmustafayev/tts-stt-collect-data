version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: tts-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ttsdb
    networks:
      - tts-network

  api:
    build: .
    container_name: tts-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./media:/app/media
    env_file:
      - .env
    environment:
      - MONGODB_URL=mongodb://mongodb:27017/ttsdb
    depends_on:
      - mongodb
    networks:
      - tts-network

volumes:
  mongodb_data:

networks:
  tts-network:
    driver: bridge
